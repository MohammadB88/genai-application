---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama3-8b-instruct
  labels:
    app: llama3-8b-instruct
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llama3-8b-instruct
  template:
    metadata:
      labels:
        app: llama3-8b-instruct
    spec:
      containers:
      - name: llama3-8b-instruct
        image: nvcr.io/nim/meta/llama-3-8b-instruct:1.12.0
        ports:
        - containerPort: 8000
        env:
        - name: NGC_API_KEY
          valueFrom:
            secretKeyRef:
              name: ngc-api-key
              key: NGC_API_KEY
        volumeMounts:
        - name: llama3-8b-nim-cache
          mountPath: /opt/nim/.cache
        # First start pulls the ~10 GB image and downloads model weights into the
        # cache PVC; the startup probe allows up to 30 minutes for that.
        startupProbe:
          httpGet:
            path: /v1/health/ready
            port: 8000
          periodSeconds: 30
          failureThreshold: 60
        readinessProbe:
          httpGet:
            path: /v1/health/ready
            port: 8000
          periodSeconds: 30
        livenessProbe:
          httpGet:
            path: /v1/health/live
            port: 8000
          periodSeconds: 60
        resources:
          limits:
            cpu: "8"
            memory: 24Gi
            nvidia.com/gpu: "1"
          requests:
            cpu: "6"
      volumes:
      - name: llama3-8b-nim-cache
        persistentVolumeClaim:
          claimName: llama3-8b-nim-cache
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      imagePullSecrets:
      - name: nim-pull-secret
