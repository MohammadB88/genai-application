apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: nim-vllm-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: nim-vllm.rules
      rules:
        - alert: NIMHighP99Latency
          expr: histogram_quantile(0.99, rate(vllm:e2e_request_latency_seconds_bucket[5m])) > 3
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High P99 request latency"
            description: "99th percentile request latency > 3s"

        - alert: NIMQueueTooLong
          expr: vllm:num_requests_waiting > 10
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Request queue too long"
            description: "More than 10 requests waiting in queue"

        - alert: NIMKVCacheHigh
          # vLLM v1 engines expose vllm:kv_cache_usage_perc; older v0 builds expose vllm:gpu_cache_usage_perc
          expr: (vllm:kv_cache_usage_perc or vllm:gpu_cache_usage_perc) > 0.9
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "KV cache usage high"
            description: "KV cache usage > 90%"

        - alert: NIMGPUMemoryHigh
          # vLLM does not expose GPU memory metrics; use DCGM framebuffer usage instead
          expr: DCGM_FI_DEV_FB_USED / (DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE) > 0.95
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "GPU memory critical"
            description: "GPU memory usage > 95%"

        - alert: NIMHighPreemptions
          expr: rate(vllm:num_preemptions_total[5m]) > 0.1
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High request preemptions"
            description: "Request preemptions rate too high"

        - alert: NIMHighTTFT
          expr: histogram_quantile(0.95, rate(vllm:time_to_first_token_seconds_bucket[5m])) > 2
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High time-to-first-token"
            description: "95th percentile TTFT > 2s"

        - alert: NIMLowThroughput
          expr: rate(vllm:generation_tokens_total[5m]) < 10
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Low token throughput"
            description: "Token throughput below 10 tps"

        - alert: NIMRequestsFailing
          # vLLM has no failure counter; aborted requests (finished_reason="abort") are the failure signal
          expr: rate(vllm:request_success_total{finished_reason="abort"}[5m]) > 0.01
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Request failures detected"
            description: "Aborted request rate > 0.01 req/s"