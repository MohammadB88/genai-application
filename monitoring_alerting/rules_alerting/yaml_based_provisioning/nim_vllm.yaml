apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: nim-vllm-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
# NOTE: runbook_url points to the public GitHub repo and will not resolve in
# air-gapped environments - replace it with an internal mirror/wiki URL if needed.
spec:
  groups:
    - name: nim-vllm.rules
      rules:
        - alert: NIMHighP99Latency
          expr: histogram_quantile(0.99, rate(vllm:e2e_request_latency_seconds_bucket[5m])) > 3
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High P99 request latency"
            description: "P99 request latency for model {{ $labels.model_name }} is {{ $value | humanize }}s (above 3s)."
            runbook_url: "https://github.com/MohammadB88/genai-application/blob/main/monitoring_alerting/rules_alerting/rules_alerts.md#prometheus-ruls-and-alerts---nim-container-with-vllm"

        - alert: NIMQueueTooLong
          expr: vllm:num_requests_waiting > 10
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Request queue too long"
            description: "{{ $value | humanize }} requests are waiting in queue for model {{ $labels.model_name }} (above 10)."
            runbook_url: "https://github.com/MohammadB88/genai-application/blob/main/monitoring_alerting/rules_alerting/rules_alerts.md#prometheus-ruls-and-alerts---nim-container-with-vllm"

        - alert: NIMKVCacheHigh
          # vLLM v1 engines expose vllm:kv_cache_usage_perc; older v0 builds expose vllm:gpu_cache_usage_perc
          expr: (vllm:kv_cache_usage_perc or vllm:gpu_cache_usage_perc) > 0.9
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "KV cache usage high"
            description: "KV cache usage for model {{ $labels.model_name }} is {{ $value | humanizePercentage }} (above 90%)."
            runbook_url: "https://github.com/MohammadB88/genai-application/blob/main/monitoring_alerting/rules_alerting/rules_alerts.md#prometheus-ruls-and-alerts---nim-container-with-vllm"

        - alert: NIMGPUMemoryHigh
          # vLLM does not expose GPU memory metrics; use DCGM framebuffer usage instead
          expr: DCGM_FI_DEV_FB_USED / (DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE) > 0.95
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "GPU memory critical"
            description: "GPU {{ $labels.gpu }} on {{ $labels.Hostname }} memory usage is {{ $value | humanizePercentage }} (above 95%)."
            runbook_url: "https://github.com/MohammadB88/genai-application/blob/main/monitoring_alerting/rules_alerting/rules_alerts.md#prometheus-ruls-and-alerts---nim-container-with-vllm"

        - alert: NIMHighPreemptions
          expr: rate(vllm:num_preemptions_total[5m]) > 0.1
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High request preemptions"
            description: "Preemption rate for model {{ $labels.model_name }} is {{ $value | humanize }}/s (above 0.1/s)."
            runbook_url: "https://github.com/MohammadB88/genai-application/blob/main/monitoring_alerting/rules_alerting/rules_alerts.md#prometheus-ruls-and-alerts---nim-container-with-vllm"

        - alert: NIMHighTTFT
          expr: histogram_quantile(0.95, rate(vllm:time_to_first_token_seconds_bucket[5m])) > 2
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High time-to-first-token"
            description: "P95 time-to-first-token for model {{ $labels.model_name }} is {{ $value | humanize }}s (above 2s)."
            runbook_url: "https://github.com/MohammadB88/genai-application/blob/main/monitoring_alerting/rules_alerting/rules_alerts.md#prometheus-ruls-and-alerts---nim-container-with-vllm"

        - alert: NIMLowThroughput
          expr: rate(vllm:generation_tokens_total[5m]) < 10
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Low token throughput"
            description: "Generation throughput for model {{ $labels.model_name }} is {{ $value | humanize }} tokens/s (below 10)."
            runbook_url: "https://github.com/MohammadB88/genai-application/blob/main/monitoring_alerting/rules_alerting/rules_alerts.md#prometheus-ruls-and-alerts---nim-container-with-vllm"

        - alert: NIMRequestsFailing
          # vLLM has no failure counter; aborted requests (finished_reason="abort") are the failure signal
          expr: rate(vllm:request_success_total{finished_reason="abort"}[5m]) > 0.01
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Request failures detected"
            description: "Aborted request rate for model {{ $labels.model_name }} is {{ $value | humanize }}/s (above 0.01/s)."
            runbook_url: "https://github.com/MohammadB88/genai-application/blob/main/monitoring_alerting/rules_alerting/rules_alerts.md#prometheus-ruls-and-alerts---nim-container-with-vllm"
