apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gpu-operator-cluster-health-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
# NOTE: runbook_url points to the public GitHub repo and will not resolve in
# air-gapped environments - replace it with an internal mirror/wiki URL if needed.
spec:
  groups:
    - name: gpu-cluster-health.rules
      rules:
        - alert: DCGMExporterDown
          expr: up{job=~".*dcgm.*|.*gpu.*"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "DCGM exporter down"
            description: "GPU metrics exporter target {{ $labels.instance }} (job {{ $labels.job }}) has not been scraped for more than 5 minutes."
            runbook_url: "https://github.com/MohammadB88/genai-application/blob/main/monitoring_alerting/rules_alerting/rules_alerts.md#prometheus-ruls-and-alerts---gpu"

        - alert: GPUDriverNotReady
          expr: kube_pod_container_status_ready{namespace="gpu-operator", pod=~".*driver.*"} == 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "GPU driver pod not ready"
            description: "GPU driver pod {{ $labels.pod }} is not ready for more than 10 minutes."
            runbook_url: "https://github.com/MohammadB88/genai-application/blob/main/monitoring_alerting/rules_alerting/rules_alerts.md#prometheus-ruls-and-alerts---gpu"

        - alert: GPUToolkitNotReady
          expr: kube_pod_container_status_ready{namespace="gpu-operator", pod=~".*toolkit.*"} == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "GPU toolkit pod not ready"
            description: "GPU toolkit pod {{ $labels.pod }} is not ready for more than 10 minutes."
            runbook_url: "https://github.com/MohammadB88/genai-application/blob/main/monitoring_alerting/rules_alerting/rules_alerts.md#prometheus-ruls-and-alerts---gpu"

        # Scoped to nodes advertising nvidia.com/gpu capacity so it does not fire for non-GPU nodes
        - alert: GPUNodeNotReady
          expr: kube_node_status_condition{condition="Ready", status="true"} == 0 and on(node) kube_node_status_capacity{resource="nvidia_com_gpu"} > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "GPU node not ready"
            description: "GPU node {{ $labels.node }} is not in Ready state."
            runbook_url: "https://github.com/MohammadB88/genai-application/blob/main/monitoring_alerting/rules_alerting/rules_alerts.md#prometheus-ruls-and-alerts---gpu"

        - alert: GPUErrorsIncreasing
          expr: increase(DCGM_FI_DEV_XID_ERRORS[10m]) > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "GPU XID errors increasing"
            description: "GPU {{ $labels.gpu }} on {{ $labels.Hostname }} reported {{ $value | humanize }} new XID errors in the last 10 minutes."
            runbook_url: "https://github.com/MohammadB88/genai-application/blob/main/monitoring_alerting/rules_alerting/rules_alerts.md#prometheus-ruls-and-alerts---gpu"
