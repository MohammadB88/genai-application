apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: nim-embedding-trt-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: nim-embedding.rules
      rules:
        # The embedding NIM is Triton-based: latency metrics are cumulative counters in
        # microseconds (no histograms by default), so this alerts on average latency.
        # For p95, start Triton with --metrics-config summary_latencies=true.
        - alert: NIMEmbeddingHighLatency
          expr: rate(nv_inference_request_duration_us[5m]) / rate(nv_inference_request_success[5m]) > 500000
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High embedding latency"
            description: "Average embedding request latency > 500ms"

        - alert: NIMEmbeddingFailures
          expr: rate(nv_inference_request_failure[5m]) > 0.01
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Embedding request failures"
            description: "Failed embedding request rate > 0.01 req/s"

        - alert: NIMEmbeddingGPUMemoryHigh
          expr: nv_gpu_memory_used_bytes / nv_gpu_memory_total_bytes > 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High GPU memory usage"
            description: "GPU memory usage > 90% during embeddings"

        - alert: NIMEmbeddingLowThroughput
          expr: rate(nv_inference_request_success[5m]) < 50
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Low embedding throughput"
            description: "Embedding requests per second < 50"

        # nv_gpu_utilization is a 0.0-1.0 gauge, not a percentage
        - alert: NIMEmbeddingGPUUtilHigh
          expr: nv_gpu_utilization > 0.95
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High GPU utilization"
            description: "GPU utilization > 95% sustained"