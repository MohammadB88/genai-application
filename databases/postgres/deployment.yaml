apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres

          image: registry.redhat.io/rhel9/postgresql-16:latest
          imagePullPolicy: IfNotPresent

          envFrom:
            - secretRef:
                name: postgres-secret

          ports:
            - containerPort: 5432
              name: postgresql

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/pgsql/data

          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 20
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 30
            periodSeconds: 20

      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc