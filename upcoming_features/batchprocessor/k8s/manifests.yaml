apiVersion: v1
kind: Namespace
metadata:
  name: batch-processing
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch-processor
  namespace: batch-processing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: batch-processor
  template:
    metadata:
      labels:
        app: batch-processor
    spec:
      containers:
      - name: processor
        image: batch-processor:latest # Placeholder for CI build
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: batch-processor
  namespace: batch-processing
spec:
  selector:
    app: batch-processor
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: batch-processor
  namespace: batch-processing
spec:
  to:
    kind: Service
      name: batch-processor
  port:
    https:
      path: /
