apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kong-gateway.fullname" . }}
  labels:
    {{- include "kong-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kong-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kong-gateway.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kong-gateway.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: kong
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: KONG_DATABASE
              value: "{{ .Values.env.database }}"
            - name: KONG_PLUGINS
              value: "{{ .Values.plugins | join ',' }}"
            {{- if .Values.aiProxy.enabled }}
            - name: KONG_PLUGINS
              value: "{{ .Values.plugins | join ',' }},ai-proxy,ai-proxy-advanced"
            {{- end }}
          ports:
            - name: proxy
              containerPort: 80
            - name: proxy-tls
              containerPort: 443
            - name: admin
              containerPort: 8001
            - name: admin-tls
              containerPort: 8444
            - name: status
              containerPort: 8100
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /status
              port: 8100
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status
              port: 8100
            initialDelaySeconds: 15
            periodSeconds: 20