# Default values for kong-gateway (clean installation using official chart)
replicaCount: 1

image:
  repository: kong/kong-gateway
  pullPolicy: IfNotPresent
  tag: "3.9"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  # runAsUser: 1001010000
  # runAsGroup: 1001010000
  # fsGroup: 1001010000

containerSecurityContext:
  runAsNonRoot: true
  # runAsUser: 1001010000
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  ports:
    - name: proxy
      port: 80
      targetPort: proxy
    - name: proxy-tls
      port: 443
      targetPort: proxy-tls
    - name: admin
      port: 8001
      targetPort: admin
    - name: admin-tls
      port: 8444
      targetPort: admin-tls
    - name: status
      port: 8100
      targetPort: status

resources:
  limits:
    cpu: "1"
    memory: "1Gi"
  requests:
    cpu: "500m"
    memory: "512Mi"

nodeSelector: {}
tolerations: []
affinity: {}

# Kong specific configuration
env:
  database: "off"
  # KONG_PLUGINS: prometheus

# # Prometheus plugin configuration (if needed, otherwise defaults are used)
# prometheus:
#   enabled: true
