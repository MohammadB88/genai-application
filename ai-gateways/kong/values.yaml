image:
  repository: kong
  tag: "3.7"

env:
  database: postgres

  # External PostgreSQL (your cluster)
  pg_host: postgres.postgres.svc.cluster.local
  pg_port: "5432"
  pg_database: kong
  pg_user: kong
  pg_password: 123456abc   # <-- match your Postgres secret

  # REQUIRED for OpenShift / external access
  admin_listen: "0.0.0.0:8001"
  admin_gui_listen: "0.0.0.0:8002"

  # For OpenShift, set these to the external URLs for the admin API and GUI
  # admin_gui_url: "https://kong-manager.apps.${CLUSTER_DOMAIN}"
  # admin_gui_api_url: "https://kong-admin.apps.${CLUSTER_DOMAIN}"
  admin_gui_url: "https://kong-manager-kong.apps.cluster-fq6cl.fq6cl.sandbox2576.opentlc.com"
  admin_gui_api_url: "https://kong-admin-kong.apps.cluster-fq6cl.fq6cl.sandbox2576.opentlc.com"

  # Logs to stdout (OpenShift best practice)
  proxy_access_log: /dev/stdout
  proxy_error_log: /dev/stderr
  admin_access_log: /dev/stdout
  admin_error_log: /dev/stderr

ingressController:
  enabled: false

admin:
  enabled: true
  type: ClusterIP
  http:
    enabled: true

manager:
  enabled: true
  type: ClusterIP
  http:
    enabled: true

proxy:
  enabled: true
  type: ClusterIP

postgresql:
  enabled: false   # IMPORTANT: external DB only

replicaCount: 1

# ============================
# IMPORTANT: OpenShift fix
# ============================
securityContext:
  runAsNonRoot: true
  runAsUser: null
  runAsGroup: null
  fsGroup: null

containerSecurityContext:
  runAsUser: null
  runAsGroup: null
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]