# =============================================================================
# Kong AI Gateway — OpenShift Deployment
# Chart: kong/ingress (https://github.com/Kong/charts/tree/main/charts/ingress)
# =============================================================================
# On OpenShift we only deploy the gateway (proxy) part — the Kong Ingress
# Controller (KIC) is disabled because OpenShift's built-in router already
# handles ingress. Kong runs as a standalone API gateway in DB-less mode,
# exposed via OpenShift Routes.
#
# OpenShift-specific settings:
#   - No fixed UID/GID (OpenShift assigns random UIDs)
#   - runAsNonRoot: true
#   - UBI-based Kong Gateway image
#   - Routes instead of Ingress resources
# =============================================================================

# ---------------------------------------------------------------------------
# Controller (KIC) — disabled on OpenShift
# OpenShift's built-in router handles ingress; we only need the gateway.
# ---------------------------------------------------------------------------
controller:
  enabled: false

# ---------------------------------------------------------------------------
# Gateway — Kong Proxy (handles all AI gateway traffic)
# ---------------------------------------------------------------------------
gateway:
  enabled: true

  deployment:
    kong:
      enabled: true

  nameOverride: "kong-gateway"

  image:
    repository: kong/kong-gateway
    tag: "3.9.0.0"
    pullPolicy: IfNotPresent

  env:
    role: traditional
    database: "off"
    router_flavor: "traditional_compatible"
    nginx_worker_processes: "2"
    proxy_access_log: /dev/stdout
    admin_access_log: /dev/stdout
    proxy_error_log: /dev/stderr
    admin_error_log: /dev/stderr

  admin:
    enabled: true
    type: ClusterIP
    http:
      enabled: true
      servicePort: 8001
      containerPort: 8001
    tls:
      enabled: false
      servicePort: 8444
      containerPort: 8444
    ingress:
      enabled: false

  proxy:
    enabled: true
    type: ClusterIP
    labels:
      enable-metrics: "true"
    http:
      enabled: true
      servicePort: 80
      containerPort: 8000
    tls:
      enabled: true
      servicePort: 443
      containerPort: 8443
    ingress:
      enabled: false

  status:
    enabled: true
    http:
      enabled: true
      containerPort: 8100

  # OpenShift — no fixed UID/GID
  podSecurityContext:
    fsGroup: null

  containerSecurityContext:
    runAsUser: null
    runAsGroup: null
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true

  # Use /status instead of /status/ready for readiness.
  # /status/ready requires at least one service/route to pass, but in DB-less
  # mode config is pushed at runtime via Admin API after the pod is ready.
  readinessProbe:
    httpGet:
      path: "/status"
      port: status
      scheme: HTTP
    initialDelaySeconds: 5
    timeoutSeconds: 5
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 3

  livenessProbe:
    httpGet:
      path: "/status"
      port: status
      scheme: HTTP
    initialDelaySeconds: 5
    timeoutSeconds: 5
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 3

  lifecycle:
    preStop:
      exec:
        command:
          - kong
          - quit
          - '--wait=15'

  terminationGracePeriodSeconds: 30

  resources:
    limits:
      cpu: "1"
      memory: "1Gi"
    requests:
      cpu: "500m"
      memory: "512Mi"

  replicaCount: 1

  serviceMonitor:
    enabled: true
    trustCRDsExist: false
    # labels:
    #   app.kubernetes.io/component: ai-gateway

  # Initial declarative config. Required in DB-less mode so Kong considers
  # itself "ready" (a config must be loaded before /status/ready passes).
  # Push actual routes/services at runtime via POST /config on the Admin API.
  dblessConfig:
    config: |
      _format_version: "3.0"
      _transform: true
      services: []
      routes: []

  ingressController:
    enabled: false

  postgresql:
    enabled: false

  migrations:
    preUpgrade: false
    postUpgrade: false

  certificates:
    enabled: false

  enterprise:
    enabled: false

  # extraLabels:
  #   app.kubernetes.io/component: ai-gateway

  # podLabels:
  #   app.kubernetes.io/component: ai-gateway

  securityContext:
    seccompProfile:
      type: RuntimeDefault
