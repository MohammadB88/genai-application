# Default values for kong-gateway (clean installation using official chart)
replicaCount: 1

image:
  repository: kong/kong-gateway
  pullPolicy: IfNotPresent
  tag: "3.9"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: "kong"

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true

containerSecurityContext:
  runAsNonRoot: true
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  ports:
    - name: proxy
      port: 80
      targetPort: proxy
    - name: proxy-tls
      port: 443
      targetPort: proxy-tls
    - name: admin
      port: 8001
      targetPort: admin
    - name: admin-tls
      port: 8444
      targetPort: admin-tls
    - name: status
      port: 8100
      targetPort: status

resources:
  limits:
    cpu: "1"
    memory: "1Gi"
  requests:
    cpu: "500m"
    memory: "512Mi"

nodeSelector: {}
tolerations: []
affinity: {}

# Kong specific configuration
env:
  # Existing DB & listener settings...
  database: "off"  # or "postgres"

  admin_listen: "0.0.0.0:8444 http2 ssl"
  admin_gui_listen: "0.0.0.0:8443 http2 ssl"
  admin_api_listen: "0.0.0.0:8443 http2 ssl"

  # Replace with YOUR actual hostnames (no trailing slashes)
  admin_api_uri: "https://kong-admin.{CLUSTER_URL}}"
  admin_gui_url: "https://kong-manager.{CLUSTER_URL}}"

  # Session config: cookie_domain must be shared by both hostnames
  # If both are subdomains of mycluster.example.com, use that:
  # admin_gui_session_conf: >-
  #   {
  #     "cookie_domain": "mycluster.example.com",
  #     "secret": "a-very-long-random-secret-generate-with-openssl-or-pwd",
  #     "cookie_secure": true
  #   }
  # KONG_PLUGINS: prometheus

# # Prometheus plugin configuration (if needed, otherwise defaults are used)
# prometheus:
#   enabled: true
