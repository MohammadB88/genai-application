# OpenShift-specific overrides for Kong Gateway
route:
  enabled: true
  # Hostnames are auto-generated by OpenShift if empty.
  # Set explicitly to use custom hostnames:
  #   host: kong-ai-gateway.apps.cluster.example.com

# OpenShift requires specific security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
    - ALL

# Service type for OpenShift
service:
  type: ClusterIP