# OpenShift-specific overrides for Kong Gateway
route:
  enabled: true
  # Hostnames are auto-generated by OpenShift if empty.
  # Set explicitly to use custom hostnames:
  #   host: kong-ai-gateway.apps.cluster.example.com

# OpenShift requires specific security context within allowed ranges
podSecurityContext:
  runAsNonRoot: true
  # runAsUser: 1001010000
  # runAsGroup: 1001010000
  # fsGroup: 1001010000

containerSecurityContext:
  runAsNonRoot: true
  capabilities:
    drop:
    - ALL

# Service type for OpenShift
service:
  type: ClusterIP