apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vllm-service-monitor
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: vllm # Matches typical vLLM deployment labels
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nim-service-monitor
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: nim # Matches typical NVIDIA NIM deployment labels
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
