apiVersion: v1
kind: Namespace
metadata:
  name: llm-d
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-d-gateway
  namespace: llm-d
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-d-gateway
  template:
    metadata:
      labels:
        app: llm-d-gateway
    spec:
      containers:
      - name: gateway
        image: llm-d-gateway:latest # Placeholder for CI build
        ports:
        - containerPort: 8000
        env:
        - name: NIM_ENDPOINT
          value: "http://nim-service.llms.svc.cluster.local"
        - name: VLLM_ENDPOINT
          value: "http://vllm-service.llms.svc.cluster.local"
---
apiVersion: v1
kind: Service
metadata:
  name: llm-d-gateway
  namespace: llm-d
spec:
  selector:
    app: llm-d-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: llm-d-gateway
  namespace: llm-d
spec:
  to:
    kind: Service
      name: llm-d-gateway
  port:
    https:
      path: /
